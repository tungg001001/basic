<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資安知識測驗（隨機+計時+解答）</title>
<style>
  body { font-family:"Microsoft JhengHei", sans-serif; background:#f0f2f5; padding:20px; }
  h1 { color:#007acc; }
  .question { margin-bottom:20px; padding:15px; background:#fff; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  .options label { display:block; margin:5px 0; cursor:pointer; }
  #nextBtn, #submitBtn, #showAnswerBtn { padding:10px 20px; font-size:16px; cursor:pointer; border-radius:5px; border:none; margin-top:10px; }
  #nextBtn { background:#28a745; color:#fff; }
  #submitBtn { background:#007acc; color:#fff; }
  #showAnswerBtn { background:#ffc107; color:#fff; }
  #timer { font-size:18px; color:#dc3545; margin-bottom:10px; }
  .correct { color:green; }
  .wrong { color:red; }
</style>
</head>
<body>

<h1>基本資安知識測驗</h1>
<div id="timer"></div>
<form id="quizForm"></form>
<button id="nextBtn">下一題</button>
<button id="submitBtn" style="display:none;">提交測驗</button>
<button id="showAnswerBtn">解答</button>
<div id="result"></div>

<script>
// 題庫（示範前10題，可自行擴充到50題）
const questions = [
  {q:"資安的三大核心原則是什麼？", type:"single", options:["機密性、完整性、可用性","保密性、可靠性、效率","安全性、速度、可維護性","加密性、隱私性、可靠性"], answer:0},
  {q:"哪一種行為屬於社交工程攻擊？", type:"single", options:["SQL注入","魚叉式釣魚郵件","DDoS攻擊","防火牆設定錯誤"], answer:1},
  {q:"防火牆可以阻擋所有惡意軟體的入侵。", type:"truefalse", answer:false},
  {q:"以下哪一種屬於惡意軟體？", type:"single", options:["木馬","DNS","SSL","VPN"], answer:0},
  {q:"哪一種攻擊會利用大量請求癱瘓服務？", type:"single", options:["Phishing","SQL Injection","DDoS","XSS"], answer:2},
  {q:"強密碼應該包含大小寫字母、數字與特殊符號。", type:"truefalse", answer:true},
  {q:"HTTPS 的作用是？", type:"single", options:["加快網頁速度","加密網頁傳輸內容","阻擋病毒","提高SEO排名"], answer:1},
  {q:"兩步驟驗證（2FA）最常搭配哪種方式？", type:"single", options:["密碼與手機驗證碼","防火牆與反病毒軟體","VPN與SSH","Cookies與瀏覽器緩存"], answer:0},
  {q:"VPN 可以保護你的 IP 位址與網路流量不被竊取。", type:"truefalse", answer:true},
  {q:"什麼是零日漏洞（Zero-Day Vulnerability）？", type:"single", options:["已知漏洞並有補丁","未被發現或公開的漏洞","網路防火牆設定錯誤","使用者的弱密碼"], answer:1}
];

// 設定隨機抽題數量
const totalQuestions = 5; // 每次測驗抽5題
let quizQuestions = [];
function shuffleArray(arr){ return arr.sort(()=>Math.random()-0.5); }
quizQuestions = shuffleArray([...questions]).slice(0,totalQuestions);

let currentIndex = 0;
let userAnswers = new Array(totalQuestions).fill(null);
const timerDiv = document.getElementById("timer");
let timeLeft = 30; // 每題30秒
let timer;

const quizForm = document.getElementById("quizForm");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");
const showAnswerBtn = document.getElementById("showAnswerBtn");

// 顯示題目
function showQuestion(index){
  clearInterval(timer);
  timeLeft = 30;
  timerDiv.textContent = `剩餘時間: ${timeLeft} 秒`;
  timer = setInterval(()=>{
    timeLeft--;
    timerDiv.textContent = `剩餘時間: ${timeLeft} 秒`;
    if(timeLeft<=0){ clearInterval(timer); nextQuestion(); }
  },1000);

  const item = quizQuestions[index];
  let html = `<div class="question"><p><strong>Q${index+1}.</strong> ${item.q}</p><div class="options">`;
  if(item.type==="single"){
    item.options.forEach((opt,i)=>{
      html += `<label><input type="radio" name="q${index}" value="${i}" ${userAnswers[index]==i?"checked":""}> ${opt}</label>`;
    });
  } else if(item.type==="truefalse"){
    html += `<label><input type="radio" name="q${index}" value="true" ${userAnswers[index]===true?"checked":""}> 正確</label>`;
    html += `<label><input type="radio" name="q${index}" value="false" ${userAnswers[index]===false?"checked":""}> 錯誤</label>`;
  }
  html += "</div></div>";
  quizForm.innerHTML = html;

  nextBtn.style.display = index===totalQuestions-1?"none":"inline-block";
  submitBtn.style.display = index===totalQuestions-1?"inline-block":"none";
}

// 下一題
function nextQuestion(){
  const selected = quizForm[`q${currentIndex}`].value;
  if(quizQuestions[currentIndex].type==="truefalse") userAnswers[currentIndex] = selected==="true";
  else userAnswers[currentIndex] = parseInt(selected);
  if(currentIndex<totalQuestions-1){
    currentIndex++;
    showQuestion(currentIndex);
  }
}

// 提交測驗
submitBtn.addEventListener("click",()=>{
  const selected = quizForm[`q${currentIndex}`].value;
  if(quizQuestions[currentIndex].type==="truefalse") userAnswers[currentIndex] = selected==="true";
  else userAnswers[currentIndex] = parseInt(selected);

  clearInterval(timer);
  let score=0;
  let feedback="";
  quizQuestions.forEach((item,i)=>{
    if(userAnswers[i]===item.answer) score++;
    let ansText = item.type==="truefalse"?(item.answer?"正確":"錯誤") : item.options[item.answer];
    feedback += `<p>Q${i+1}: 正確答案: ${ansText}</p>`;
  });
  document.getElementById("result").innerHTML = `<h2>你的分數: ${score}/${totalQuestions}</h2>` + feedback;
});

// 顯示解答
showAnswerBtn.addEventListener("click",()=>{
  let answerList="";
  quizQuestions.forEach((item,i)=>{
    let ansText = item.type==="truefalse"?(item.answer?"正確":"錯誤") : item.options[item.answer];
    answerList += `<p>Q${i+1} 正確答案: ${ansText}</p>`;
  });
  document.getElementById("result").innerHTML = "<h2>解答</h2>" + answerList;
});

showQuestion(currentIndex);
nextBtn.addEventListener("click",nextQuestion);
