<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>個人電腦安全設定｜Cyber Security SOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: "Microsoft JhengHei", monospace;
    background: radial-gradient(circle at top, #020617, #000);
    color: #e5e7eb;
}
header {
    text-align: center;
    padding: 30px;
    background: linear-gradient(90deg, #020617, #020617);
    border-bottom: 1px solid #0ea5e9;
}
header h1 {
    color: #38bdf8;
    margin: 0;
}
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}
.card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 30px;
}
.card h2 {
    color: #22d3ee;
    margin-top: 0;
}
.flow {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    text-align: center;
}
.flow div {
    background: #020617;
    border: 1px solid #38bdf8;
    border-radius: 8px;
    padding: 15px;
}
.flow span {
    font-size: 30px;
}
.checklist label {
    display: block;
    margin: 10px 0;
    cursor: pointer;
}
.quiz button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #0ea5e9;
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
.result {
    margin-top: 15px;
    font-weight: bold;
    color: #22c55e;
}
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #1e293b;
    color: #94a3b8;
}
</style>

<script>
function gradeQuiz() {
    let score = 0;
    if (document.querySelector('input[name="q1"]:checked')?.value === "b") score++;
    if (document.querySelector('input[name="q2"]:checked')?.value === "a") score++;
    if (document.querySelector('input[name="q3"]:checked')?.value === "c") score++;
    document.getElementById("score").innerText =
        "你的得分：" + score + " / 3";
}
</script>
</head>

<body>

<header>
    <h1>🔐 個人電腦安全設定 SOP</h1>
    <p>Cyber Security × CTF 教學網站</p>
</header>

<div class="container">

<!-- SOP 流程圖 -->
<div class="card">
<h2>🧭 資安 SOP 流程圖</h2>
<div class="flow">
    <div><span>🛠️</span><br>系統更新</div>
    <div><span>🔑</span><br>帳號密碼</div>
    <div><span>🛡️</span><br>防毒防火牆</div>
    <div><span>🌐</span><br>瀏覽器安全</div>
    <div><span>💾</span><br>資料備份</div>
    <div><span>🎣</span><br>社交工程防範</div>
</div>
</div>

<!-- 檢查清單 -->
<div class="card">
<h2>✅ 個人電腦安全檢查清單</h2>
<div class="checklist">
<label><input type="checkbox"> 作業系統已更新</label>
<label><input type="checkbox"> 密碼長度 ≥ 12</label>
<label><input type="checkbox"> 啟用防火牆</label>
<label><input type="checkbox"> 已安裝防毒軟體</label>
<label><input type="checkbox"> 瀏覽器 HTTPS 模式</label>
<label><input type="checkbox"> 已完成資料備份</label>
</div>
</div>

<!-- 測驗 -->
<div class="card quiz">
<h2>🧠 資安小測驗（CTF Style）</h2>

<p>Q1. 下列何者是安全的密碼？</p>
<label><input type="radio" name="q1" value="a"> 12345678</label><br>
<label><input type="radio" name="q1" value="b"> A9#kL2@pQx!</label><br>
<label><input type="radio" name="q1" value="c"> birthday2024</label>

<p>Q2. 防火牆主要功能是？</p>
<label><input type="radio" name="q2" value="a"> 過濾網路流量</label><br>
<label><input type="radio" name="q2" value="b"> 清除病毒</label><br>
<label><input type="radio" name="q2" value="c"> 加速網路</label>

<p>Q3. 釣魚郵件最常利用？</p>
<label><input type="radio" name="q3" value="a"> 防毒漏洞</label><br>
<label><input type="radio" name="q3" value="b"> 系統更新</label><br>
<label><input type="radio" name="q3" value="c"> 使用者心理</label>

<button onclick="gradeQuiz()">送出測驗</button>
<div id="score" class="result"></div>
</div>

</div>

<footer>
© Cyber Security Training | CTF Teaching Page
</footer>

</body>
</html>
